name: Chief of Staff Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cos-review:
    runs-on: ubuntu-latest
    name: Chief of Staff — conflict & ownership check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Get changed files
        run: |
          DELIM="CREDITMIND_$(openssl rand -hex 8)"
          {
            echo "CHANGED_FILES<<$DELIM"
            git diff --name-only origin/master...HEAD
            echo "$DELIM"
          } >> "$GITHUB_ENV"

      - name: Get PR diff
        run: |
          DELIM="CREDITMIND_$(openssl rand -hex 8)"
          {
            echo "PR_DIFF<<$DELIM"
            git diff origin/master...HEAD | head -c 10000
            echo "$DELIM"
          } >> "$GITHUB_ENV"

      - name: Run Chief of Staff
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python team/chief_of_staff.py
